name: 'CI'
on: [pull_request]
jobs:
    build-lint-test:
        name: Lint, typecheck, test & build
        runs-on: ubuntu-latest

        steps:
            - name: Step 1 - checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

            - name: Step 2 - setup node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
              with:
                node-version-file: '.nvmrc'

            # Single install at the monorepo root installs every workspace.
            - name: Step 3 - install
              run: npm ci

            - name: Step 4 - lint
              run: npm run lint

            - name: Step 5 - typecheck
              run: npm run typecheck

            - name: Step 6 - test
              run: npm run test

            - name: Step 7 - build
              run: npm run build

    e2e:
        name: E2E tests
        runs-on: ubuntu-latest

        steps:
            - name: Step 1 - info
              run: echo "🎉 Triggered by a ${{ github.event_name }} event on ${{ runner.os }}, branch ${{ github.ref }}."

            - name: Step 2 - checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

            - name: Step 3 - setup node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
              with:
                node-version-file: '.nvmrc'

            - name: Step 4 - install
              run: npm ci

            # `npm run ci` boots the spot-client dev server, waits for it, runs the
            # WebdriverIO suite (headless Chrome), then tears the server down.
            - name: Step 5 - run E2E [spot-webdriver]
              working-directory: spot-webdriver
              run: npm run ci

            - name: Step 6 - Archive Test Results
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
              with:
                name: webdriver-results
                path: spot-webdriver/webdriver-results/
