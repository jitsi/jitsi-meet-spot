name: 'CI - spot-electron'
on: [pull_request]
jobs:
    build-spot-electron-mac:
        name: Build on macOS
        runs-on: macOS-latest

        steps:
            - name: Step 1 - checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

            - name: Step 2 - setup node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
              with:
                node-version-file: '.nvmrc'

            - name: Step 3 - run install
              working-directory: 'spot-electron'
              run: npm install

            - name: Step 4 - build
              working-directory: 'spot-electron'
              run: npm run dist

    build-spot-electron-windows:
        name: Build on Windows
        runs-on: windows-latest

        steps:
            - name: Step 1 - checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

            - name: Step 2 - setup node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
              with:
                node-version-file: '.nvmrc'

            - name: Step 3 - run install
              working-directory: 'spot-electron'
              run: npm install

            - name: Step 4 - build
              working-directory: 'spot-electron'
              run: npm run dist

    unit-tests-spot-electron:
        name: Unit-tests
        runs-on: ubuntu-latest

        steps:
            - name: Step 1 - checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

            - name: Step 2 - setup node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
              with:
                node-version-file: '.nvmrc'

            - name: Step 3 - run install
              working-directory: 'spot-electron'
              run: npm install

            - name: Step 4 - run lint
              working-directory: 'spot-electron'
              run: npm run lint

            - name: Step 5 - run test
              working-directory: 'spot-electron'
              run: npm run test
